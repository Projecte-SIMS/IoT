version: '3.8'
services:
  server:
    build: ./server
    container_name: fastapi-server
    restart: always
    env_file:
      - server/.env
    ports:
      - "8001:8000"
    volumes:
      - ./server:/app

  # El servicio de Mongo no estaba definido en el compose pero se usaba en la URI
  # Si usas MongoDB Atlas (la nube), no necesitas este servicio.
  # Si quieres mongo local, descomenta esto:
  # mongo:
  #   image: mongo:latest
  #   container_name: mongodb
  #   ports:
  #     - "27017:27017"
  #   volumes:
  #     - mongo_data:/data/db

volumes:
  mongo_data:
