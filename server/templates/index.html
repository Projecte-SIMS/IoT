<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Raspberry Manager</title>
  <script src="/static/app.js" defer></script>
  <style>body{font-family:Arial;margin:20px} button{margin-left:8px}</style>
</head>
<body>
  <h1>Raspberry Manager</h1>
  <section>
    <h2>Create device</h2>
    <input id="name" placeholder="Device name" />
    <input id="vehicle" placeholder="Vehicle id (optional)" />
    <button id="create">Create</button>
  </section>
  <section>
    <h2>Devices</h2>
    <button id="refresh">Refresh</button>
    <ul id="devices"></ul>
  </section>
</body>
</html>
