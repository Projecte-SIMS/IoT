services:
  - type: web
    name: sims-iot-microservice
    env: docker
    dockerContext: ./server
    plan: free
    envVars:
      - key: IOT_API_KEY
        sync: false
      - key: OPENAI_API_KEY # Por si lo usa tu chatbot
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DATABASE
        value: cluster-iot
